<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Agent World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1024px; height: 1080px; overflow: hidden; background: #1a1a2e; display: flex; flex-direction: column; }
    #drag-region {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      z-index: 9999;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), transparent);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: grab;
    }
    #drag-region:active { cursor: grabbing; }
    .window-btn {
      -webkit-app-region: no-drag;
      width: 36px;
      height: 28px;
      border: none;
      background: transparent;
      color: #c9a96e;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .window-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .window-btn.close:hover { background: #c42b1c; color: #fff; }
    #app {
      width: 1024px;
      height: 768px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    #dashboard {
      width: 1024px;
      height: 312px;
      flex-shrink: 0;
      overflow-y: auto;
      background: #0f0f1a;
      border-top: 1px solid #2a2a3e;
      color: #c9a96e;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
    }
    #audio-controls {
      position: fixed;
      bottom: 320px;
      right: 8px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      padding: 4px 8px;
    }
    #btn-mute {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #c9a96e;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      padding: 0;
      line-height: 1;
    }
    #btn-mute:hover { background: rgba(255, 255, 255, 0.1); }
    #volume-slider {
      -webkit-app-region: no-drag;
      width: 60px;
      height: 4px;
      accent-color: #c9a96e;
      cursor: pointer;
    }
    /* Dashboard totals bar */
    .dashboard-totals {
      display: flex;
      gap: 16px;
      padding: 6px 0 8px 0;
      border-bottom: 1px solid #2a2a3e;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .dashboard-totals .stat {
      color: #c9a96e;
      font-size: 13px;
    }
    .dashboard-totals .stat-label {
      color: #887744;
      font-size: 11px;
      text-transform: uppercase;
      margin-right: 4px;
    }
    /* History summary */
    .history-summary {
      display: flex;
      gap: 16px;
      padding: 4px 0 6px 0;
      border-bottom: 1px solid #2a2a3e;
      margin-bottom: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .history-summary .history-label {
      color: #556644;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .history-summary .stat {
      color: #8a8a6e;
      font-size: 12px;
    }
    .history-summary .stat-label {
      color: #666644;
      font-size: 10px;
      text-transform: uppercase;
      margin-right: 3px;
    }
    /* Session list */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .session-row {
      background: #141422;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .session-row:hover {
      background: #1a1a30;
    }
    .session-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .session-summary .project-name {
      color: #c9a96e;
      font-weight: 600;
      min-width: 120px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-summary .status-badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .status-badge.active  { background: #0a3a2a; color: #00d4aa; }
    .status-badge.waiting { background: #3a2a0a; color: #f0a030; }
    .status-badge.idle    { background: #2a2a2a; color: #888888; }
    .status-badge.error   { background: #3a0a0a; color: #cc3333; }
    .session-summary .model-badge {
      font-size: 11px;
      color: #8888aa;
      background: #1e1e30;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .session-summary .tool-name {
      color: #7777aa;
      font-size: 12px;
      min-width: 50px;
    }
    .session-summary .duration {
      color: #666688;
      font-size: 12px;
      margin-left: auto;
    }
    .session-summary .cost {
      color: #aa9966;
      font-size: 13px;
      font-weight: 600;
      min-width: 60px;
      text-align: right;
    }
    /* Expanded detail */
    .session-detail {
      padding: 4px 8px 8px 16px;
      border-top: 1px solid #1e1e30;
    }
    .token-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 12px;
    }
    .token-label {
      color: #887744;
    }
    .token-value {
      color: #aaaacc;
    }
    .token-row.cost-row .token-value {
      color: #c9a96e;
      font-weight: 600;
    }
    .token-row.savings-row .token-value {
      color: #44aa88;
    }
    .session-list .empty-state {
      color: #665533;
      text-align: center;
      padding: 20px 0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="drag-region">
    <button class="window-btn" id="btn-minimize">&#x2014;</button>
    <button class="window-btn close" id="btn-close">&#x2715;</button>
  </div>
  <div id="app"></div>
  <div id="dashboard"></div>
  <div id="audio-controls">
    <button id="btn-mute" title="Mute/Unmute">&#x1F50A;</button>
    <input type="range" id="volume-slider" min="0" max="100" value="50" title="Volume" />
  </div>
</body>
</html>
