<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Agent World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #drag-region {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      z-index: 9999;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), transparent);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: grab;
    }
    #drag-region:active { cursor: grabbing; }
    .window-btn {
      -webkit-app-region: no-drag;
      width: 36px;
      height: 28px;
      border: none;
      background: transparent;
      color: #c9a96e;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .window-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .window-btn.close:hover { background: #c42b1c; color: #fff; }
    #app {
      width: 100%;
      height: 100%;
      -webkit-app-region: no-drag;
    }
  </style>
</head>
<body>
  <div id="drag-region">
    <button class="window-btn" id="btn-minimize">&#x2014;</button>
    <button class="window-btn close" id="btn-close">&#x2715;</button>
  </div>
  <div id="app"></div>
</body>
</html>
