<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Agent World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1024px; height: 1080px; overflow: hidden; background: #1a1a2e; display: flex; flex-direction: column; }
    #drag-region {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      z-index: 9999;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), transparent);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: grab;
    }
    #drag-region:active { cursor: grabbing; }
    .window-btn {
      -webkit-app-region: no-drag;
      width: 36px;
      height: 28px;
      border: none;
      background: transparent;
      color: #c9a96e;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .window-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .window-btn.close:hover { background: #c42b1c; color: #fff; }
    #app {
      width: 1024px;
      height: 768px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    #dashboard {
      width: 1024px;
      height: 312px;
      flex-shrink: 0;
      overflow-y: auto;
      background: #0f0f1a;
      border-top: 1px solid #2a2a3e;
      color: #c9a96e;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
    }
    #audio-controls {
      position: fixed;
      bottom: 320px;
      right: 8px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      padding: 4px 8px;
    }
    #btn-mute {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #c9a96e;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      padding: 0;
      line-height: 1;
    }
    #btn-mute:hover { background: rgba(255, 255, 255, 0.1); }
    #volume-slider {
      -webkit-app-region: no-drag;
      width: 60px;
      height: 4px;
      accent-color: #c9a96e;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="drag-region">
    <button class="window-btn" id="btn-minimize">&#x2014;</button>
    <button class="window-btn close" id="btn-close">&#x2715;</button>
  </div>
  <div id="app"></div>
  <div id="dashboard">
    <p style="color: #665533; margin-top: 4px;">Usage Dashboard</p>
  </div>
  <div id="audio-controls">
    <button id="btn-mute" title="Mute/Unmute">&#x1F50A;</button>
    <input type="range" id="volume-slider" min="0" max="100" value="50" title="Volume" />
  </div>
</body>
</html>
